<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Игра "Кто как говорит?"</title>
  <style>
    :root {
      --card-size: min(28vw, 320px);
      --shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: #15233a;
      background: #c7ecff url("fon.png") center / cover no-repeat fixed;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .game {
      position: relative;
      overflow: hidden;
      width: min(1400px, 100%);
      background: transparent;
      border-radius: 0;
      box-shadow: none;
      padding: clamp(16px, 2vw, 28px);
      text-align: center;
    }

    .game.game--splash-open {
      position: fixed;
      inset: 0;
      width: 100%;
      max-width: none;
      min-height: 100vh;
      min-height: 100dvh;
      z-index: 1000;
      margin: 0;
      background: #000;
      box-shadow: none;
      padding: 0;
      border-radius: 0;
    }

    body.body--splash {
      padding: 0;
      overflow: hidden;
    }

    .splash {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-end;
      min-height: min(72vh, 620px);
      border-radius: 0;
      overflow: hidden;
      position: relative;
    }

    .game.game--splash-open .splash {
      min-height: 100vh;
      min-height: 100dvh;
      height: 100%;
      width: 100%;
    }

    .splash-ui {
      position: absolute;
      left: 50%;
      top: clamp(40px, 11vh, 100px);
      transform: translateX(-50%);
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(24px, 4.5vh, 56px);
      width: min(92vw, 640px);
      pointer-events: none;
    }

    .splash-title {
      position: static;
      transform: none;
      width: 100%;
      max-width: none;
      margin: 0;
      padding: 0 8px;
      font-size: clamp(22px, 3.4vw, 44px);
      font-weight: 800;
      line-height: 1.15;
      color: #143a66;
      text-align: center;
      text-shadow:
        0 0 10px rgba(255, 255, 255, 0.95),
        0 0 22px rgba(255, 255, 255, 0.75),
        0 1px 0 rgba(255, 255, 255, 0.9);
      pointer-events: none;
    }

    .splash-bg {
      position: absolute;
      inset: 0;
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
    }

    .splash-bg--tv {
      background-image: url("splash-tv.png");
    }

    .splash-bg--mobile {
      display: none;
      background-image: url("splash-mobile.png");
    }

    @media (max-width: 900px) and (orientation: portrait) {
      .splash-bg--tv {
        display: none;
      }

      .splash-bg--mobile {
        display: block;
      }
    }

    .splash-actions {
      position: static;
      transform: none;
      z-index: 2;
      width: 100%;
      max-width: 100%;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: transparent;
      pointer-events: none;
    }

    .splash-actions .splash-start {
      pointer-events: auto;
    }

    .splash-start {
      min-width: min(280px, 86vw);
      padding: 14px 28px;
      font-size: clamp(20px, 4.5vw, 28px);
      margin-bottom: 0;
    }

    .game-main {
      position: relative;
      z-index: 1;
    }

    .title {
      margin: 0 0 10px;
      font-size: clamp(24px, 3.2vw, 42px);
    }

    .task {
      margin: 0 0 8px;
      font-size: clamp(22px, 3vw, 38px);
      font-weight: 800;
    }

    .status {
      min-height: 1.5em;
      margin: 4px 0 20px;
      font-size: clamp(18px, 2.2vw, 30px);
      font-weight: 700;
    }

    .status.ok {
      color: #0a8f3d;
    }

    .status.error {
      color: #d6362f;
    }

    .animals {
      display: flex;
      justify-content: center;
      align-items: stretch;
      gap: clamp(16px, 2.4vw, 30px);
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .animal-btn {
      width: var(--card-size);
      border: 0;
      border-radius: 22px;
      background: #ffffff;
      box-shadow: var(--shadow);
      padding: 12px;
      cursor: pointer;
      touch-action: manipulation;
      transition: transform 120ms ease, box-shadow 120ms ease;
    }

    .animal-btn:active {
      transform: scale(0.97);
    }

    .animal-btn img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: contain;
      border-radius: 14px;
      display: block;
      background: #f4fbff;
    }

    .controls {
      margin-top: 12px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .next-btn,
    .start-btn,
    .stop-btn {
      border: 0;
      border-radius: 14px;
      color: #fff;
      font-size: clamp(18px, 1.9vw, 28px);
      font-weight: 700;
      padding: 12px 26px;
      cursor: pointer;
      box-shadow: var(--shadow);
      touch-action: manipulation;
    }

    .next-btn {
      background: #1f8fff;
    }

    .start-btn {
      background: linear-gradient(135deg, #2db85f, #14a44d);
    }

    .stop-btn {
      background: linear-gradient(135deg, #ef4e4e, #d6362f);
    }

    .next-btn:active,
    .start-btn:active,
    .stop-btn:active {
      transform: scale(0.98);
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 900px) {
      :root {
        --card-size: min(42vw, 280px);
      }

      body {
        padding: 12px;
        background-attachment: scroll;
      }

      .splash {
        min-height: min(62vh, 540px);
      }

      .game.game--splash-open .splash-ui {
        top: clamp(32px, 9vh, 88px);
        gap: clamp(20px, 3.8vh, 48px);
      }

      .game:not(.game--splash-open) {
        border-radius: 0;
        padding: 14px;
      }

      .title {
        margin-bottom: 8px;
      }

      .task {
        margin-bottom: 6px;
      }

      .status {
        margin-bottom: 12px;
      }

      .animals {
        gap: 12px;
      }

      .animal-btn {
        border-radius: 16px;
        padding: 8px;
      }

      .animal-btn img {
        border-radius: 10px;
      }

      .controls {
        position: sticky;
        bottom: 0;
        padding-top: 8px;
      }

      .next-btn,
      .start-btn,
      .stop-btn {
        min-width: min(42vw, 230px);
        padding: 10px 18px;
      }
    }

    @media (max-width: 560px) {
      :root {
        --card-size: min(44vw, 190px);
      }

      .animals {
        justify-content: center;
      }

      .next-btn,
      .start-btn,
      .stop-btn {
        width: 100%;
        max-width: 320px;
      }
    }
  </style>
</head>
<body>
  <main class="game">
    <div id="splash" class="splash">
      <div class="splash-bg splash-bg--tv" aria-hidden="true"></div>
      <div class="splash-bg splash-bg--mobile" aria-hidden="true"></div>
      <div class="splash-ui">
        <h1 class="splash-title">Кто как говорит?</h1>
        <div class="splash-actions">
          <button id="startBtn" type="button" class="start-btn splash-start">Начать игру</button>
        </div>
      </div>
    </div>
    <div id="gameMain" class="game-main hidden">
      <h1 class="title">Кто как говорит?</h1>
      <p id="task" class="task"></p>
      <p id="status" class="status"></p>
      <section id="animals" class="animals"></section>
      <div class="controls">
        <button id="nextBtn" type="button" class="next-btn">Дальше</button>
        <button id="stopBtn" type="button" class="stop-btn">Стоп</button>
      </div>
    </div>
  </main>

  <script>
    const animals = [
      { id: "dog", name: "Собака", soundText: "Гав", imageFile: "dog.png", soundFile: "dog.m4a", questionFile: "q_dog.m4a" },
      { id: "cat", name: "Котенок", soundText: "Мяу", imageFile: "cat.png", soundFile: "cat.m4a", questionFile: "q_cat.m4a" },
      { id: "duck", name: "Утка", soundText: "Кря-кря", imageFile: "duck.png", soundFile: "duck.m4a", questionFile: "q_duck.m4a" },
      { id: "cow", name: "Коровка", soundText: "Му-у", imageFile: "cow.png", soundFile: "cow.m4a", questionFile: "q_cow.m4a" },
      { id: "goat", name: "Козочка", soundText: "Ме-е", imageFile: "goat.png", soundFile: "goat.m4a", questionFile: "q_goat.m4a" },
      { id: "horse", name: "Лошадка", soundText: "Иго-го", imageFile: "horse.png", soundFile: "horse.m4a", questionFile: "q_horse.m4a" }
    ];
    let cardsPerRound = 3;

    const wrongAudio = new Audio("wrong.m4a");
    const audioById = Object.fromEntries(
      animals.map((animal) => [animal.id, new Audio(animal.soundFile)])
    );
    const questionAudioById = Object.fromEntries(
      animals.map((animal) => [animal.id, new Audio(animal.questionFile)])
    );

    const gameRoot = document.querySelector("main.game");
    const splashEl = document.getElementById("splash");
    const gameMainEl = document.getElementById("gameMain");
    const taskEl = document.getElementById("task");
    const statusEl = document.getElementById("status");
    const startBtn = document.getElementById("startBtn");
    const nextBtn = document.getElementById("nextBtn");
    const stopBtn = document.getElementById("stopBtn");
    const animalsEl = document.getElementById("animals");

    let targetAnimal = null;
    let canTap = true;
    let hasUserGesture = false;
    let gameStarted = false;
    let autoNextTimeoutId = null;
    let questionTimeoutId = null;
    let currentRoundAnimals = [];
    let roundQueue = [];
    let roundQueueIndex = 0;

    function updateLayoutSettings() {
      cardsPerRound = window.matchMedia("(max-width: 560px)").matches ? 2 : 3;
    }

    function shuffle(list) {
      const copy = [...list];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function pickRoundAnimals() {
      const shuffled = shuffle(animals);
      currentRoundAnimals = shuffled.slice(0, Math.min(cardsPerRound, animals.length));
      roundQueue = shuffle([...currentRoundAnimals]);
      roundQueueIndex = 0;
    }

    function renderCurrentRound() {
      animalsEl.innerHTML = "";
      currentRoundAnimals.forEach((animal) => {
        const button = document.createElement("button");
        button.className = "animal-btn";
        button.dataset.id = animal.id;
        button.setAttribute("aria-label", animal.name);
        button.innerHTML = `<img src="${animal.imageFile}" alt="${animal.name}" />`;
        button.addEventListener("click", () => onAnimalTap(animal.id));
        animalsEl.appendChild(button);
      });
    }

    function updateControls() {
      splashEl.classList.toggle("hidden", gameStarted);
      gameMainEl.classList.toggle("hidden", !gameStarted);
      nextBtn.classList.toggle("hidden", !gameStarted);
      stopBtn.classList.toggle("hidden", !gameStarted);
      gameRoot.classList.toggle("game--splash-open", !gameStarted);
      document.body.classList.toggle("body--splash", !gameStarted);
    }

    function stopAllAudio() {
      if (autoNextTimeoutId) {
        window.clearTimeout(autoNextTimeoutId);
        autoNextTimeoutId = null;
      }
      if (questionTimeoutId) {
        window.clearTimeout(questionTimeoutId);
        questionTimeoutId = null;
      }
      Object.values(audioById).forEach((audio) => {
        audio.pause();
        audio.currentTime = 0;
        audio.onended = null;
      });
      Object.values(questionAudioById).forEach((audio) => {
        audio.pause();
        audio.currentTime = 0;
        audio.onended = null;
      });
      wrongAudio.pause();
      wrongAudio.currentTime = 0;
      wrongAudio.onended = null;
    }

    function showStatus(text, ok) {
      statusEl.textContent = text;
      statusEl.className = `status ${ok ? "ok" : "error"}`;
    }

    function playAudio(audio) {
      stopAllAudio();
      audio.currentTime = 0;
      audio.play().catch(() => {});
    }

    function playQuestionAudio() {
      if (!targetAnimal) return;
      const questionAudio = questionAudioById[targetAnimal.id];
      if (!questionAudio) return;

      if (questionTimeoutId) {
        window.clearTimeout(questionTimeoutId);
      }
      questionTimeoutId = window.setTimeout(() => {
        questionTimeoutId = null;
        playAudio(questionAudio);
      }, 250);
    }

    function startNextRound() {
      if (!gameStarted) return;
      updateLayoutSettings();
      pickRoundAnimals();
      renderCurrentRound();
      pickNextTarget();
    }

    function pickNextTarget() {
      if (animals.length === 0) {
        taskEl.textContent = "Добавьте животных в игру.";
        return;
      }

      if (currentRoundAnimals.length === 0 || roundQueueIndex >= roundQueue.length) {
        startNextRound();
        return;
      }

      targetAnimal = roundQueue[roundQueueIndex];
      roundQueueIndex += 1;

      taskEl.textContent = `Кто говорит "${targetAnimal.soundText}"?`;
      statusEl.textContent = "";
      statusEl.className = "status";
      canTap = true;
      playQuestionAudio();
    }

    function onAnimalTap(animalId) {
      if (!gameStarted) return;
      if (!hasUserGesture) {
        hasUserGesture = true;
        playQuestionAudio();
        return;
      }
      if (!canTap || !targetAnimal) return;

      if (animalId === targetAnimal.id) {
        showStatus("Правильно!", true);
        const correctAudio = audioById[animalId];
        playAudio(correctAudio);
        canTap = false;

        const goToNext = () => {
          correctAudio.onended = null;
          pickNextTarget();
        };
        correctAudio.onended = goToNext;
        autoNextTimeoutId = window.setTimeout(goToNext, 2500);
      } else {
        showStatus("Подумай еще!", false);
        playAudio(wrongAudio);
      }
    }

    function startGame() {
      gameStarted = true;
      hasUserGesture = true;
      statusEl.textContent = "";
      statusEl.className = "status";
      updateControls();
      startNextRound();
    }

    function stopGame() {
      gameStarted = false;
      canTap = false;
      targetAnimal = null;
      stopAllAudio();
      taskEl.textContent = "";
      statusEl.textContent = "";
      statusEl.className = "status";
      animalsEl.innerHTML = "";
      updateControls();
    }

    startBtn.addEventListener("click", startGame);
    nextBtn.addEventListener("click", () => {
      startNextRound();
    });
    stopBtn.addEventListener("click", stopGame);

    updateLayoutSettings();
    window.addEventListener("resize", updateLayoutSettings);
    taskEl.textContent = "";
    updateControls();
  </script>
</body>
</html>
